<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
<div class="app-shell">
  <div class="app-card">

    <div class="brand">
      <img src="img/logo.png" alt="Logo">
      <div>
        <h2>Sorteo</h2>
        <p>Realiza el intercambio respetando las exclusiones</p>
      </div>
    </div>

    <a href="evento.html" class="btn-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Editar evento
    </a>

    <!-- Resumen del evento -->
    <div id="resumenEvento" class="p-3 border rounded-3 bg-white mb-4"></div>

    <!-- Botón sortear -->
    <button onclick="sortear()" class="btn btn-danger w-100 mb-4" style="padding:12px; font-size:1rem; font-weight:600;">
      🎲 Realizar sorteo
    </button>

    <!-- Resultados -->
    <ul id="resultado" class="list-group"></ul>

  </div>
</div>

<script src="js/localstorage.js"></script>
<script src="js/toast.js"></script>
<script src="js/sorteo.js"></script>
</body>
</html>
